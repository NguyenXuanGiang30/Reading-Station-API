# Server Configuration
server.port=8080

# Application Name
spring.application.name=ReadingStation

# ========================================
# MySQL Database Configuration
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/reading_station?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=giang2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# JPA / Hibernate Configuration
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# JWT Configuration
# ========================================
app.jwt.secret=ReadingStationSecretKey2024VeryLongSecretKeyForJWTTokenGenerationMustBe256Bits
app.jwt.expiration-ms=86400000

# ========================================
# Swagger/OpenAPI Configuration
# ========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.org.example=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ========================================
# Google Books API Configuration
# ========================================
# Optional: Thêm API key để tăng quota (không bắt buộc)
google.books.api.key=
